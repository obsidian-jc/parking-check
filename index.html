<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="지하점검">
<meta name="theme-color" content="#1a56db">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>지하주차장 점검</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f5;--card:#fff;--primary:#1a56db;--primary-light:#e8f0fe;
  --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
  --orange:#d97706;--orange-bg:#fef3c7;--text:#111;--sub:#666;
  --border:#e5e7eb;--radius:14px;--shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* 헤더 */
#hdr{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:12px 16px 0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#hdr-title{font-size:16px;font-weight:700}
#hdr-meta{font-size:11px;opacity:.8;text-align:right;line-height:1.6}
#floor-tabs{display:flex;gap:4px}
.floor-tab{flex:1;padding:8px 0;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;font-weight:600;border-radius:10px 10px 0 0;cursor:pointer}
.floor-tab.active{background:#fff;color:var(--primary)}
/* 서브헤더 */
#sub-hdr{background:#fff;padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:88px;z-index:99}
#prog-wrap{flex:1}
#prog-label{font-size:11px;color:var(--sub);margin-bottom:3px;display:flex;justify-content:space-between}
#prog-bar{height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden}
#prog-fill{height:100%;background:var(--green);border-radius:99px;transition:.3s}
#reset-btn{font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--sub);cursor:pointer;white-space:nowrap}
/* 탭바 */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;border:none;background:none;padding:8px 0 5px;cursor:pointer;font-size:10px;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .ico{font-size:22px;line-height:1}
.tab-btn.active{color:var(--primary);font-weight:600}
#issue-badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:9px;border-radius:99px;padding:1px 5px;display:none}
/* 메인 */
#main{padding:12px 12px 90px}
/* 시설 카드 */
.fac-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border-left:4px solid transparent}
.fac-card.done{border-left-color:var(--green)}
.fac-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.fac-num{min-width:34px;height:34px;border-radius:50%;background:var(--primary-light);color:var(--primary);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fac-card.done .fac-num{background:var(--green-bg);color:var(--green)}
.fac-info{flex:1;min-width:0}
.fac-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fac-loc{font-size:11px;color:var(--sub);margin-top:2px}
.memo-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}
.check-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fac-card.done .check-btn{background:var(--green);border-color:var(--green);color:#fff}
/* 카드 바디 */
.fac-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.fac-card.open .fac-body{display:block}
.memo-area{width:100%;min-height:72px;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:none;margin-top:10px;color:var(--text)}
.memo-area:focus{outline:none;border-color:var(--primary)}
.fac-actions{display:flex;gap:8px;margin-top:8px}
.act-btn{flex:1;padding:10px 0;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.act-save{background:var(--primary);color:#fff}
.act-photo{background:var(--orange-bg);color:var(--orange)}
.photo-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.photo-thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.memo-hist{margin-top:10px;background:var(--bg);border-radius:10px;padding:8px 10px}
.memo-hist-title{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:4px}
.memo-hist-row{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.memo-hist-row:last-child{border-bottom:none}
.memo-hist-date{color:var(--sub);font-size:10px;white-space:nowrap}
/* 이상 */
.issue-add-btn{width:100%;padding:14px;border-radius:var(--radius);border:2px dashed var(--red);background:var(--red-bg);color:var(--red);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}
.issue-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:14px;border-left:4px solid var(--orange)}
.issue-card.urgent{border-left-color:var(--red)}
.issue-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:4px}
.issue-tag.urgent{background:var(--red-bg);color:var(--red)}
.issue-tag.warn{background:var(--orange-bg);color:var(--orange)}
.issue-fl{font-size:11px;color:var(--sub);float:right}
.issue-fac{font-size:14px;font-weight:600;margin-bottom:2px}
.issue-time{font-size:11px;color:var(--sub);margin-bottom:6px}
.issue-memo-txt{font-size:13px;color:#333}
.issue-photo-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;margin-top:8px;cursor:pointer;margin-right:4px}
.del-btn{margin-top:8px;font-size:11px;color:var(--sub);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
.empty-msg{text-align:center;color:var(--sub);font-size:13px;padding:32px 0;line-height:2}
/* 보고서 */
.rpt-ctrl{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.rpt-ctrl input[type=date]{flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit}
.rpt-ctrl-btn{padding:9px 14px;border-radius:10px;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.rpt-summary{background:var(--primary);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.rpt-stat-val{font-size:24px;font-weight:700}
.rpt-stat-lbl{font-size:10px;opacity:.8}
.rpt-section-title{font-size:11px;font-weight:700;color:var(--sub);margin:12px 0 6px;letter-spacing:.5px}
.rpt-row{background:var(--card);border-radius:10px;padding:12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rpt-row-top{display:flex;justify-content:space-between;margin-bottom:4px}
.rpt-row-name{font-size:13px;font-weight:600}
.rpt-row-floor{font-size:10px;color:var(--sub)}
.rpt-row-memo{font-size:13px;color:#333}
/* 달력 */
.cal-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.cal-nav-btn{width:38px;height:38px;border:none;background:var(--bg);border-radius:50%;font-size:20px;cursor:pointer}
.cal-month{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-dow{text-align:center;font-size:11px;color:var(--sub);padding:4px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px;cursor:pointer;background:var(--card)}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.today{font-weight:700;box-shadow:0 0 0 2px var(--primary)}
.cal-day.has-memo{background:var(--green-bg);color:var(--green);font-weight:700}
.cal-day.has-issue{background:var(--red-bg);color:var(--red);font-weight:700}
.cal-day.has-both{background:linear-gradient(135deg,var(--red-bg) 50%,var(--green-bg) 50%);font-weight:700}
.cal-legend{display:flex;gap:16px;justify-content:center;font-size:12px;color:var(--sub)}
.cal-leg{display:flex;align-items:center;gap:5px}
.cal-dot{width:12px;height:12px;border-radius:4px}
/* 데이터 */
.data-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.data-card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.data-card-desc{font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.6}
.data-btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.data-btn.export{background:var(--primary);color:#fff}
.data-btn.import{background:var(--green-bg);color:var(--green)}
.storage-info{font-size:11px;color:var(--sub);text-align:center;padding:8px}
/* 이상 등록 시트 */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end}
.sheet-bg.show{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom)+20px);width:100%;max-height:88vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:99px;margin:0 auto 16px}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
.field textarea{min-height:80px;resize:none}
.sheet-actions{display:flex;gap:8px;margin-top:16px}
.sheet-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.sheet-btn.cancel{background:var(--bg);color:var(--sub)}
.sheet-btn.confirm{background:var(--primary);color:#fff}
/* 커스텀 다이얼로그 */
#dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:center;justify-content:center;padding:24px}
#dlg-bg.show{display:flex}
#dlg-box{background:#fff;border-radius:18px;padding:24px 20px;width:100%;max-width:300px;text-align:center}
#dlg-msg{font-size:15px;line-height:1.7;margin-bottom:20px;color:var(--text);white-space:pre-line}
#dlg-btns{display:flex;gap:10px}
#dlg-cancel{flex:1;padding:12px;border-radius:12px;border:none;background:var(--bg);color:var(--sub);font-size:15px;font-weight:600;cursor:pointer}
#dlg-ok{flex:1;padding:12px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
#dlg-ok.danger{background:var(--red)}
/* 사진 뷰어 */
#photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:800;display:none;align-items:center;justify-content:center}
#photo-viewer.show{display:flex}
#photo-viewer img{max-width:100%;max-height:90vh;border-radius:8px}
#pv-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer}
/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;white-space:nowrap;animation:fadeIO 1.8s ease forwards}
@keyframes fadeIO{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%)}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-top">
    <div id="hdr-title">🏢 래미안 원베일리 지하주차장</div>
    <div id="hdr-meta"><div id="hdr-clock"></div><div id="hdr-storage" style="color:rgba(255,255,255,.7)"></div></div>
  </div>
  <div id="floor-tabs">
    <button class="floor-tab active" id="btn-B4" onclick="setFloor('B4')">지하 4층</button>
    <button class="floor-tab" id="btn-B3" onclick="setFloor('B3')">지하 3층</button>
    <button class="floor-tab" id="btn-B2" onclick="setFloor('B2')">지하 2층</button>
  </div>
</div>
<div id="sub-hdr">
  <div id="prog-wrap">
    <div id="prog-label"><span id="prog-text">0/0 완료</span><span id="prog-pct">0%</span></div>
    <div id="prog-bar"><div id="prog-fill"></div></div>
  </div>
  <button id="reset-btn" onclick="doReset()">초기화</button>
</div>
<div id="main">
  <div id="panel-route"></div>
  <div id="panel-issue" style="display:none">
    <button class="issue-add-btn" onclick="openIssueSheet()">+ 이상 사항 등록</button>
    <div id="issue-list"></div>
  </div>
  <div id="panel-report" style="display:none"></div>
  <div id="panel-cal" style="display:none"></div>
  <div id="panel-data" style="display:none">
    <div class="data-card">
      <div class="data-card-title">💾 데이터 내보내기</div>
      <div class="data-card-desc">메모·이상기록·사진을 JSON 파일로 저장합니다.<br>OneDrive / iCloud Drive에 보관하세요.</div>
      <button class="data-btn export" onclick="exportData()">📤 JSON 파일 내보내기</button>
    </div>
    <div class="data-card">
      <div class="data-card-title">📂 데이터 불러오기</div>
      <div class="data-card-desc">저장해둔 JSON 파일을 불러옵니다.<br>기존 데이터와 병합됩니다.</div>
      <button class="data-btn import" onclick="document.getElementById('import-file').click()">📥 JSON 파일 불러오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="storage-info" id="storage-info"></div>
  </div>
</div>
<div id="tabbar">
  <button class="tab-btn active" id="stab-route" onclick="setTab('route')"><span class="ico">🚶</span>순찰</button>
  <button class="tab-btn" id="stab-issue" onclick="setTab('issue')" style="position:relative"><span class="ico">⚠️</span>이상<div id="issue-badge"></div></button>
  <button class="tab-btn" id="stab-report" onclick="setTab('report')"><span class="ico">📋</span>보고서</button>
  <button class="tab-btn" id="stab-cal" onclick="setTab('cal')"><span class="ico">📅</span>달력</button>
  <button class="tab-btn" id="stab-data" onclick="setTab('data')"><span class="ico">🗂</span>데이터</button>
</div>
<!-- 이상 등록 시트 -->
<div class="sheet-bg" id="issue-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">이상 사항 등록</div>
    <div class="field"><label>층</label>
      <select id="is-floor"><option value="B4">지하 4층</option><option value="B3">지하 3층</option><option value="B2">지하 2층</option></select>
    </div>
    <div class="field"><label>시설명</label><input type="text" id="is-facility" placeholder="예: 지열펌프실 #1"></div>
    <div class="field"><label>등급</label>
      <select id="is-level"><option value="warn">주의</option><option value="urgent">긴급</option></select>
    </div>
    <div class="field"><label>이상 내용</label><textarea id="is-memo" placeholder="이상 내용을 입력하세요"></textarea></div>
    <div class="field">
      <label>사진 첨부</label>
      <button type="button" onclick="document.getElementById('is-photo-input').click()" style="width:100%;padding:11px;border:1.5px dashed var(--border);border-radius:10px;background:var(--bg);font-size:14px;cursor:pointer;color:var(--sub)">📷 사진 선택</button>
      <input type="file" id="is-photo-input" accept="image/*" style="display:none" onchange="onIssuePhoto(event)">
      <div class="photo-list" id="is-photo-preview"></div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn cancel" onclick="closeIssueSheet()">취소</button>
      <button class="sheet-btn confirm" onclick="saveIssue()">등록</button>
    </div>
  </div>
</div>
<!-- 커스텀 다이얼로그 -->
<div id="dlg-bg">
  <div id="dlg-box">
    <div id="dlg-msg"></div>
    <div id="dlg-btns">
      <button id="dlg-cancel" onclick="dlgAnswer(false)">취소</button>
      <button id="dlg-ok" onclick="dlgAnswer(true)">확인</button>
    </div>
  </div>
</div>
<!-- 사진 뷰어 -->
<div id="photo-viewer" onclick="this.classList.remove('show')">
  <button id="pv-close">X</button>
  <img id="pv-img" src="" alt="">
</div>
<script>
const ROUTES={
  B4:[
    {n:1,name:'펌프실#1 · 저수조#1',loc:'123동 인근'},
    {n:2,name:'지열펌프실 #1',loc:'123동 위'},
    {n:3,name:'지열펌프실 #2',loc:'102동 인근'},
    {n:4,name:'지열펌프실 #3',loc:'119동 인근'},
    {n:5,name:'수영장펌프실 #1·#2',loc:'106동 인근'},
    {n:6,name:'지열펌프실 #5',loc:'106동 하단'},
    {n:7,name:'지열펌프실 #6',loc:'115동 인근'},
    {n:8,name:'펌프실#2 · 저수조#2',loc:'114동 인근'},
    {n:9,name:'지열펌프실 #4',loc:'112동 인근 ★'},
  ],
  B3:[
    {n:1,name:'빗물저수조#6 펌프실',loc:'113동 우측'},
    {n:2,name:'빗물저수조#5 펌프실',loc:'109동 인근'},
    {n:3,name:'정화조 관리층 #2',loc:'110동 인근'},
    {n:4,name:'빗물저수조#4 펌프실',loc:'117동 인근'},
    {n:5,name:'정화조 관리층 #3',loc:'118동 인근'},
    {n:6,name:'빗물저수조#3 펌프실',loc:'106동 인근'},
    {n:7,name:'정화조 관리층 #1',loc:'107동 인근'},
    {n:8,name:'빗물저수조#2 펌프실',loc:'104동 인근'},
    {n:9,name:'빗물저수조#1 펌프실',loc:'105동 인근 ★'},
  ],
  B2:[
    {n:1,name:'열교환실 #1',loc:'123동 인근'},
    {n:2,name:'연료전지실',loc:'120동 위'},
    {n:3,name:'열교환실 #3',loc:'114동 인근'},
    {n:4,name:'전기실#1 · 발전기실#1',loc:'112동 인근'},
    {n:5,name:'공조실 #1',loc:'106동 인근'},
    {n:6,name:'열교환실 #2',loc:'106동 인근'},
    {n:7,name:'전기실#2 · 발전기실#2',loc:'107동 인근'},
  ],
};
const STORE_KEY='raemian_v2';
let state={checked:{},stepMemos:{},issues:[]};
let floor='B4',curTab='route',calYear=null,calMonth=null,issuePhotos=[];
let dlgCb=null;

function loadState(){
  try{const r=localStorage.getItem(STORE_KEY);if(r){const s=JSON.parse(r);if(s.checked)state.checked=s.checked;if(s.stepMemos)state.stepMemos=s.stepMemos;if(s.issues)state.issues=s.issues;}}catch(e){}
}
function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(state));updateStorageInfo();}
  catch(e){showAlert('저장 공간이 부족합니다.\n오래된 데이터를 내보내고 정리해 주세요.');}
}
function updateStorageInfo(){
  try{
    const b=new Blob([localStorage.getItem(STORE_KEY)||'']).size;
    const txt=b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(2)+'MB';
    const el=document.getElementById('storage-info');if(el)el.textContent='현재 저장 용량: '+txt;
    const h=document.getElementById('hdr-storage');if(h)h.textContent='💾 '+txt;
  }catch(e){}
}
function showConfirm(msg,danger){
  return new Promise(resolve=>{
    document.getElementById('dlg-msg').textContent=msg;
    document.getElementById('dlg-ok').className=danger?'danger':'';
    document.getElementById('dlg-cancel').style.display='';
    document.getElementById('dlg-bg').classList.add('show');
    dlgCb=resolve;
  });
}
function showAlert(msg){
  return new Promise(resolve=>{
    document.getElementById('dlg-msg').textContent=msg;
    document.getElementById('dlg-ok').className='';
    document.getElementById('dlg-cancel').style.display='none';
    document.getElementById('dlg-bg').classList.add('show');
    dlgCb=resolve;
  });
}
function dlgAnswer(v){document.getElementById('dlg-bg').classList.remove('show');if(dlgCb){dlgCb(v);dlgCb=null;}}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1900);}
function tick(){const now=new Date();const el=document.getElementById('hdr-clock');if(el)el.textContent=now.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'})+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
setInterval(tick,15000);
function today(){return new Date().toISOString().slice(0,10);}
function floorName(f){return f==='B2'?'지하2층':f==='B3'?'지하3층':'지하4층';}

function setFloor(f){
  floor=f;
  ['B2','B3','B4'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===f));
  if(curTab==='route')renderRoute();
}
function setTab(tab){
  curTab=tab;
  ['route','issue','report','cal','data'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
    const p=document.getElementById('panel-'+t);if(p)p.style.display=t===tab?'block':'none';
  });
  document.getElementById('sub-hdr').style.display=tab==='route'?'flex':'none';
  if(tab==='route')renderRoute();
  if(tab==='issue')renderIssueList();
  if(tab==='report')renderReport();
  if(tab==='cal')renderCalendar();
  if(tab==='data')updateStorageInfo();
}
function renderRoute(){
  const steps=ROUTES[floor];
  const checked=state.checked[floor]||{};
  const done=steps.filter(s=>checked[s.n]).length;
  const pct=steps.length?Math.round(done/steps.length*100):0;
  document.getElementById('prog-text').textContent=done+'/'+steps.length+' 완료';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  const td=today();
  let html='';
  steps.forEach(function(s){
    const isDone=!!checked[s.n];
    const memos=(state.stepMemos[floor]&&state.stepMemos[floor][s.n])||{};
    const todayMemo=memos[td]||'';
    const hasMemo=Object.keys(memos).filter(function(k){return k!=='__photos__';}).length>0;
    const hist=Object.entries(memos).filter(function(e){return e[0]!==td&&e[0]!=='__photos__';}).sort(function(a,b){return b[0].localeCompare(a[0]);}).slice(0,3);
    const fl=floor,n=s.n;
    html+='<div class="fac-card'+(isDone?' done':'')+'" id="card-'+fl+'-'+n+'">';
    html+='<div class="fac-hdr" onclick="toggleCard(\''+fl+'\','+n+')">';
    html+='<div class="fac-num">'+(isDone?'✓':n)+'</div>';
    html+='<div class="fac-info"><div class="fac-name">'+s.name+'</div><div class="fac-loc">'+s.loc+'</div></div>';
    if(hasMemo)html+='<div class="memo-dot"></div>';
    html+='<button class="check-btn" onclick="event.stopPropagation();toggleCheck(\''+fl+'\','+n+')">'+(isDone?'✓':'○')+'</button>';
    html+='</div>';
    html+='<div class="fac-body">';
    html+='<textarea class="memo-area" id="memo-'+fl+'-'+n+'" placeholder="오늘 메모를 입력하세요">'+todayMemo+'</textarea>';
    html+='<div class="fac-actions">';
    html+='<button class="act-btn act-save" onclick="saveMemo(\''+fl+'\','+n+')">저장</button>';
    html+='<button class="act-btn act-photo" onclick="document.getElementById(\'sp-'+fl+'-'+n+'\').click()">📷 사진</button>';
    html+='<input type="file" id="sp-'+fl+'-'+n+'" accept="image/*" style="display:none" onchange="onStepPhoto(event,\''+fl+'\','+n+')">';
    html+='</div>';
    html+='<div class="photo-list" id="pl-'+fl+'-'+n+'"></div>';
    if(hist.length){
      html+='<div class="memo-hist"><div class="memo-hist-title">이전 메모</div>';
      hist.forEach(function(e){html+='<div class="memo-hist-row"><span class="memo-hist-date">'+e[0]+'</span><span>'+(e[1].length>40?e[1].slice(0,40)+'...':e[1])+'</span></div>';});
      html+='</div>';
    }
    html+='</div></div>';
  });
  document.getElementById('panel-route').innerHTML=html;
  steps.forEach(function(s){renderStepPhotos(floor,s.n);});
}
function toggleCard(fl,n){const el=document.getElementById('card-'+fl+'-'+n);if(el)el.classList.toggle('open');}
function toggleCheck(fl,n){
  if(!state.checked[fl])state.checked[fl]={};
  state.checked[fl][n]=!state.checked[fl][n];
  saveState();renderRoute();
}
function saveMemo(fl,n){
  const el=document.getElementById('memo-'+fl+'-'+n);if(!el)return;
  const txt=el.value.trim();
  if(!state.stepMemos[fl])state.stepMemos[fl]={};
  if(!state.stepMemos[fl][n])state.stepMemos[fl][n]={};
  if(txt)state.stepMemos[fl][n][today()]=txt;else delete state.stepMemos[fl][n][today()];
  saveState();showToast('메모 저장됨 ✓');
}
function doReset(){
  showConfirm(floorName(floor)+' 체크를 모두 초기화할까요?',true).then(function(ok){
    if(!ok)return;
    state.checked[floor]={};saveState();renderRoute();showToast('초기화 완료');
  });
}
function onStepPhoto(e,fl,n){
  const file=e.target.files[0];if(!file)return;
  compressPhoto(file,function(b64){
    if(!state.stepMemos[fl])state.stepMemos[fl]={};
    if(!state.stepMemos[fl][n])state.stepMemos[fl][n]={};
    if(!state.stepMemos[fl][n]['__photos__'])state.stepMemos[fl][n]['__photos__']=[];
    state.stepMemos[fl][n]['__photos__'].push({date:today(),data:b64});
    saveState();renderStepPhotos(fl,n);showToast('사진 저장됨 ✓');
  });
  e.target.value='';
}
function renderStepPhotos(fl,n){
  const el=document.getElementById('pl-'+fl+'-'+n);if(!el)return;
  const photos=(state.stepMemos[fl]&&state.stepMemos[fl][n]&&state.stepMemos[fl][n]['__photos__'])||[];
  el.innerHTML=photos.slice(-6).map(function(p){return '<img class="photo-thumb" src="'+p.data+'" onclick="viewPhoto(\''+p.data+'\')">';}).join('');
}
function openIssueSheet(){
  document.getElementById('is-floor').value=floor;
  document.getElementById('is-facility').value='';
  document.getElementById('is-memo').value='';
  document.getElementById('is-level').value='warn';
  document.getElementById('is-photo-preview').innerHTML='';
  issuePhotos=[];
  document.getElementById('issue-sheet').classList.add('show');
}
function closeIssueSheet(){document.getElementById('issue-sheet').classList.remove('show');}
function onIssuePhoto(e){
  const file=e.target.files[0];if(!file)return;
  compressPhoto(file,function(b64){
    issuePhotos.push(b64);
    const prev=document.getElementById('is-photo-preview');
    const img=document.createElement('img');img.className='photo-thumb';img.src=b64;
    img.onclick=function(){viewPhoto(b64);};prev.appendChild(img);
  });
  e.target.value='';
}
function saveIssue(){
  const memo=document.getElementById('is-memo').value.trim();
  if(!memo){showAlert('이상 내용을 입력하세요.');return;}
  const now=new Date();
  state.issues.push({
    id:Date.now(),floor:document.getElementById('is-floor').value,
    facility:document.getElementById('is-facility').value.trim()||'위치 미지정',
    level:document.getElementById('is-level').value,memo:memo,photos:issuePhotos.slice(),
    time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    date:now.toISOString().slice(0,10),
  });
  saveState();closeIssueSheet();renderIssueList();updateIssueBadge();showToast('이상 사항 등록됨');
}
function deleteIssue(id){
  showConfirm('이상 사항을 삭제할까요?',true).then(function(ok){
    if(!ok)return;
    state.issues=state.issues.filter(function(i){return i.id!==id;});
    saveState();renderIssueList();updateIssueBadge();
  });
}
function renderIssueList(){
  const list=state.issues.slice().reverse();
  const el=document.getElementById('issue-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">이상 사항이 없습니다.<br>위의 버튼으로 등록하세요.</div>';return;}
  el.innerHTML=list.map(function(i){
    const photos=(i.photos||[]).map(function(p){return '<img class="issue-photo-thumb" src="'+p+'" onclick="viewPhoto(\''+p+'\')">';}).join('');
    return '<div class="issue-card '+i.level+'"><span class="issue-tag '+i.level+'">'+(i.level==='urgent'?'긴급':'주의')+'</span><span class="issue-fl">'+floorName(i.floor)+'</span><div class="issue-fac">'+i.facility+'</div><div class="issue-time">'+i.date+' '+i.time+'</div><div class="issue-memo-txt">'+i.memo+'</div>'+photos+'<br><button class="del-btn" onclick="deleteIssue('+i.id+')">삭제</button></div>';
  }).join('');
}
function updateIssueBadge(){const b=document.getElementById('issue-badge');const cnt=state.issues.length;b.textContent=cnt;b.style.display=cnt?'block':'none';}
function renderReport(){
  const td=today();
  document.getElementById('panel-report').innerHTML='<div class="rpt-ctrl"><input type="date" id="rpt-date" value="'+td+'" onchange="buildReport()"><button class="rpt-ctrl-btn" style="background:var(--green)" onclick="copyReport()">복사</button></div><div id="rpt-body"></div>';
  buildReport();
}
function buildReport(){
  const sel=(document.getElementById('rpt-date')||{}).value||today();
  const memos=[];
  Object.entries(ROUTES).forEach(function(entry){
    const fl=entry[0],steps=entry[1];
    steps.forEach(function(s){
      const txt=state.stepMemos[fl]&&state.stepMemos[fl][s.n]&&state.stepMemos[fl][s.n][sel];
      if(txt)memos.push({floor:fl,name:s.name,memo:txt});
    });
  });
  const issList=state.issues.filter(function(i){return i.date===sel;});
  const totalSteps=Object.values(ROUTES).reduce(function(a,b){return a+b.length;},0);
  const totalDone=Object.values(state.checked).reduce(function(a,o){return a+Object.values(o).filter(Boolean).length;},0);
  let html='<div class="rpt-summary"><div><div class="rpt-stat-val">'+totalDone+'</div><div class="rpt-stat-lbl">완료/'+totalSteps+'</div></div><div><div class="rpt-stat-val">'+memos.length+'</div><div class="rpt-stat-lbl">메모</div></div><div><div class="rpt-stat-val">'+issList.length+'</div><div class="rpt-stat-lbl">이상</div></div></div>';
  if(memos.length){
    html+='<div class="rpt-section-title">시설별 메모</div>';
    html+=memos.map(function(m){return '<div class="rpt-row"><div class="rpt-row-top"><span class="rpt-row-name">'+m.name+'</span><span class="rpt-row-floor">'+floorName(m.floor)+'</span></div><div class="rpt-row-memo">'+m.memo+'</div></div>';}).join('');
  }
  if(issList.length){
    html+='<div class="rpt-section-title">이상 마킹</div>';
    html+=issList.map(function(i){return '<div class="rpt-row" style="border-left:3px solid '+(i.level==='urgent'?'var(--red)':'var(--orange)')+'"><div class="rpt-row-top"><span class="rpt-row-name">'+(i.level==='urgent'?'긴급':'주의')+' '+i.facility+'</span><span class="rpt-row-floor">'+floorName(i.floor)+'</span></div><div style="font-size:11px;color:var(--sub)">'+i.time+'</div><div class="rpt-row-memo">'+i.memo+'</div></div>';}).join('');
  }
  if(!memos.length&&!issList.length)html+='<div class="empty-msg">해당 날짜의 기록이 없습니다.</div>';
  const el=document.getElementById('rpt-body');if(el)el.innerHTML=html;
}
function copyReport(){
  const sel=(document.getElementById('rpt-date')||{}).value||today();
  let txt='[래미안 원베일리 점검보고] '+sel+'\n\n';
  Object.entries(ROUTES).forEach(function(entry){
    const fl=entry[0],steps=entry[1];
    steps.forEach(function(s){const m=state.stepMemos[fl]&&state.stepMemos[fl][s.n]&&state.stepMemos[fl][s.n][sel];if(m)txt+='• ['+floorName(fl)+'] '+s.name+': '+m+'\n';});
  });
  const issList=state.issues.filter(function(i){return i.date===sel;});
  if(issList.length){txt+='\n이상 사항\n';issList.forEach(function(i,k){txt+=(k+1)+'. ['+(i.level==='urgent'?'긴급':'주의')+'] '+i.facility+' ('+floorName(i.floor)+') '+i.time+'\n   '+i.memo+'\n';});}
  navigator.clipboard.writeText(txt).then(function(){showToast('보고서 복사됨 ✓');}).catch(function(){showAlert(txt);});
}
function renderCalendar(){
  if(calYear===null){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
  const mm=String(calMonth+1).padStart(2,'0');const prefix=calYear+'-'+mm;
  const hasMemo=new Set(),hasIssue=new Set();
  Object.values(state.stepMemos).forEach(function(ns){Object.values(ns).forEach(function(dates){Object.keys(dates).filter(function(d){return d!=='__photos__';}).forEach(function(d){if(d.startsWith(prefix))hasMemo.add(+d.slice(8,10));});});});
  state.issues.forEach(function(i){if(i.date&&i.date.startsWith(prefix))hasIssue.add(+i.date.slice(8,10));});
  const now=new Date();const tD=now.getDate(),tM=now.getMonth(),tY=now.getFullYear();
  const first=new Date(calYear,calMonth,1).getDay();const days=new Date(calYear,calMonth+1,0).getDate();
  const mnames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let html='<div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()">&#8249;</button><div class="cal-month">'+calYear+'년 '+mnames[calMonth]+'</div><button class="cal-nav-btn" onclick="calNext()">&#8250;</button></div><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  for(let i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const hM=hasMemo.has(d),hI=hasIssue.has(d),isToday=d===tD&&calMonth===tM&&calYear===tY;
    let cls='cal-day';
    if(hM&&hI)cls+=' has-both';else if(hM)cls+=' has-memo';else if(hI)cls+=' has-issue';
    if(isToday)cls+=' today';
    const ds=calYear+'-'+mm+'-'+String(d).padStart(2,'0');
    html+='<div class="'+cls+'" onclick="calClick(\''+ds+'\')">'+d+'</div>';
  }
  html+='</div><div class="cal-legend"><div class="cal-leg"><div class="cal-dot" style="background:var(--green-bg);border:1px solid var(--green)"></div>메모</div><div class="cal-leg"><div class="cal-dot" style="background:var(--red-bg);border:1px solid var(--red)"></div>이상</div></div>';
  document.getElementById('panel-cal').innerHTML=html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calClick(ds){setTab('report');setTimeout(function(){const inp=document.getElementById('rpt-date');if(inp){inp.value=ds;buildReport();}},50);}
function exportData(){
  const data=JSON.stringify({checked:state.checked,stepMemos:state.stepMemos,issues:state.issues,exportedAt:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='지하주차장_점검기록_'+today()+'.json';a.click();
  showToast('내보내기 완료 ✓');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imp=JSON.parse(ev.target.result);
      showConfirm(file.name+'\n불러오기할까요? 기존 데이터와 병합됩니다.').then(function(ok){
        if(!ok)return;
        const existIds=new Set(state.issues.map(function(i){return i.id;}));
        (imp.issues||[]).forEach(function(i){if(!existIds.has(i.id))state.issues.push(i);});
        Object.entries(imp.stepMemos||{}).forEach(function(entry){
          const fl=entry[0],ns=entry[1];
          if(!state.stepMemos[fl])state.stepMemos[fl]={};
          Object.entries(ns).forEach(function(e2){
            const n=e2[0],dates=e2[1];
            if(!state.stepMemos[fl][n])state.stepMemos[fl][n]={};
            Object.assign(state.stepMemos[fl][n],dates);
          });
        });
        Object.entries(imp.checked||{}).forEach(function(entry){
          const fl=entry[0],obj=entry[1];
          if(!state.checked[fl])state.checked[fl]={};
          Object.assign(state.checked[fl],obj);
        });
        saveState();renderRoute();updateIssueBadge();showToast('불러오기 완료 ✓');
      });
    }catch(err){showAlert('파일 형식이 올바르지 않습니다.');}
  };
  reader.readAsText(file);e.target.value='';
}
function compressPhoto(file,cb){
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      const MAX=900;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.62));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function viewPhoto(src){document.getElementById('pv-img').src=src;document.getElementById('photo-viewer').classList.add('show');}
window.addEventListener('load',function(){
  loadState();tick();updateIssueBadge();updateStorageInfo();setTab('route');
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}
</script>
</body>
</html>
